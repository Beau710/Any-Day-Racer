<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Any Day Racer</title>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <header class="hero">
      <div class="hero-content description">
        <h1>Any Day Racer</h1>
        <p>Race the trails your way, any day.</p>
        <a href="#" class="btn search">Login with Strava</a>
      </div>
    </header>

    <section class="stats-cards leaderboard">
      <div class="card">
        <h3>Monthly Rides</h3>
        <p>12</p>
      </div>
      <div class="card">
        <h3>Best Segment</h3>
        <p>5:12</p>
      </div>
      <div class="card">
        <h3>Total Distance</h3>
        <p>432 km</p>
      </div>
      <div class="card">
        <h3>Avg Speed</h3>
        <p>28 km/h</p>
      </div>
    </section>
  </body>
</html>
