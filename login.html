<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log In — Any Day Racer</title>
    <link rel="stylesheet" href="index.css" />
    <link rel="stylesheet" href="signup.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <nav class="nav">
      <a href="index.html" class="nav-logo"
        >Any Day <span class="logo-accent">Racer</span></a
      >
      <div class="nav-links">
        <a href="leaderboard.html">Leaderboard</a>
        <a href="#">Trails</a>
        <a href="#">Archive</a>
        <a href="login.html" id="nav-login">Log In</a>
        <a href="profile.html" id="nav-profile" style="display:none">My Profile</a>
        <button class="btn-logout" id="nav-logout" style="display:none" onclick="logout()">Log Out</button>
      </div>
    </nav>

    <main class="signup-wrap">
      <div class="signup-heading">
        <p class="section-label">Welcome back</p>
        <h1 class="signup-title">Log in</h1>
      </div>

      <div class="signup-card">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="your@email.com" />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Your password" />
        </div>

        <p id="login-error" style="display:none; font-family: var(--font-body); color: #e05555; font-size: 0.85rem; margin-bottom: 1rem;"></p>

        <button id="login-btn" class="btn-strava signup-btn">Log In</button>
      </div>

      <p style="font-family: var(--font-body); color: var(--grey-text); font-size: 0.85rem; margin-top: 1.25rem; text-align: center;">
        Not a member yet?
        <a href="signup.html" style="color: var(--accent);">Sign up here</a>
      </p>
    </main>

    <footer class="footer">
      <p class="footer-logo">Any Day <span class="logo-accent">Racer</span></p>
      <p class="footer-sub">Race the trails your way any day.</p>
      <p class="footer-copy">&copy; 2026 Any Day Racer</p>
    </footer>

    <script src="login.js"></script>
    <script src="main.js"></script>
  </body>
</html>
