<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Profile — Any Day Racer</title>
    <link rel="stylesheet" href="index.css" />
    <link rel="stylesheet" href="signup.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <nav class="nav">
      <a href="index.html" class="nav-logo"
        >Any Day <span class="logo-accent">Racer</span></a
      >
      <div class="nav-links">
        <a href="leaderboard.html">Leaderboard</a>
        <a href="#">Trails</a>
        <a href="#">Archive</a>
        <a href="login.html" id="nav-login">Log In</a>
        <a href="profile.html" id="nav-profile" style="display:none">My Profile</a>
        <button class="btn-logout" id="nav-logout" style="display:none" onclick="logout()">Log Out</button>
      </div>
    </nav>

    <main class="signup-wrap">
      <div class="signup-heading">
        <p class="section-label">Get started</p>
        <h1 class="signup-title">Create your profile</h1>
        <p class="signup-sub">
          Tell us a bit about yourself. You can update these any time.
        </p>
      </div>

      <div class="signup-card">
        <div class="form-group">
          <label for="name">Display name</label>
          <input type="text" id="name" placeholder="e.g. Beau Rider" />
        </div>

        <div class="form-group">
          <label for="homepark">Home park</label>
          <input type="text" id="homepark" placeholder="e.g. Woodhill Bike Park" />
        </div>

        <div class="form-group">
          <label for="bike">Bike</label>
          <input type="text" id="bike" placeholder="e.g. Trek Slash 9" />
        </div>

        <div class="form-group">
          <label for="trail">Favourite trail</label>
          <input type="text" id="trail" placeholder="e.g. 1700" />
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="e.g. beau@email.com" />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Choose a password" />
        </div>

        <p id="signup-error" style="display:none; font-family: var(--font-body); color: #e05555; font-size: 0.85rem; margin-bottom: 1rem;"></p>

        <button id="strava-btn" class="btn-strava signup-btn">Connect with Strava</button>
      </div>
    </main>

    <footer class="footer">
      <p class="footer-logo">Any Day <span class="logo-accent">Racer</span></p>
      <p class="footer-sub">Race the trails your way any day.</p>
      <p class="footer-copy">&copy; 2026 Any Day Racer</p>
    </footer>

    <script src="signup.js"></script>
    <script src="main.js"></script>
  </body>
</html>
