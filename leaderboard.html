<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Leaderboard</title>
    <link rel="stylesheet" href="index.css" />
    <link rel="stylesheet" href="leaderboard.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <nav class="nav">
      <a href="index.html" class="nav-logo">Any Day Racer</a>
      <div class="nav-links">
        <a href="leaderboard.html">Leaderboard</a>
        <a href="#">Trails</a>
        <a href="#">Archive</a>
        <a href="profile.html" class="nav-strava">My Profile</a>
      </div>
    </nav>
    <div class="leaderboard">
      <div class="description">
        <h2>1700 Monthly Leaderboard</h2>
        <input class="search" placeholder="search" id="search" />
        <table>
          <thead>
            <tr>
              <td>Rank</td>
              <td>Racer</td>
              <td>Time</td>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td id="gold">1</td>
              <td id="gold"><p>Player 1</p></td>
              <td id="gold">2:56</td>
            </tr>
            <tr>
              <td id="silver">2</td>
              <td id="silver"><p>Player 2</p></td>
              <td>3:10</td>
            </tr>
            <tr>
              <td id="bronze">3</td>
              <td id="bronze"><p>Player 3</p></td>
              <td id="bronze">3:15</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </body>
  <script>
    function search() {
      var text = document.getElementById("search").value;
      const trs = document.getElementsByTagName("tr");
      for (let i = 1; i < trs.length; i++) {
        if (
          !trs[i].children[1].innerHTML
            .toLowerCase()
            .includes(text.toLowerCase())
        ) {
          trs[i].style.display = "none";
        } else {
          trs[i].style.display = "";
        }
      }
    }
  </script>
</html>
